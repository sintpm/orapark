<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Pearl Long An – Đô Thị Chuyên Gia Tây Sài Gòn</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #8B6914;
    --navy: #0D1B2A;
    --navy-mid: #1A2F45;
    --navy-light: #243B55;
    --cream: #F9F5EE;
    --cream-dark: #EEE6D5;
    --white: #FFFFFF;
    --text-dark: #1A1A1A;
    --text-mid: #4A4A4A;
    --text-light: #888;
    --red-cta: #C0392B;
    --red-hover: #A93226;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Roboto', sans-serif; color: var(--text-dark); background: var(--white); overflow-x: hidden; }

  /* NAVBAR */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: rgba(13,27,42,0.96);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .nav-logo { font-family: 'Roboto', sans-serif; color: var(--gold); font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .nav-logo span { color: var(--white); font-size: 12px; display: block; font-family: 'Roboto', sans-serif; font-weight: 300; letter-spacing: 3px; margin-top: -2px; }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; letter-spacing: 0.5px; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta { background: var(--gold); color: var(--navy); padding: 10px 22px; border-radius: 2px; font-size: 13px; font-weight: 600; text-decoration: none; letter-spacing: 0.5px; transition: background 0.2s; white-space: nowrap; }
  .nav-cta:hover { background: var(--gold-light); }
  .nav-phone { color: var(--gold); font-size: 14px; font-weight: 600; margin-right: 16px; }

  /* HERO */
  .hero {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 50%, #1B3A5C 100%);
    display: flex; align-items: center;
    position: relative; overflow: hidden;
    padding-top: 68px;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60"><rect width="60" height="60" fill="none"/><path d="M0 60L60 0" stroke="rgba(201,168,76,0.04)" stroke-width="1"/></svg>') repeat;
  }
  .hero-pattern {
    position: absolute; right: -100px; top: 50%; transform: translateY(-50%);
    width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%);
  }
  .hero-content { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 420px; gap: 60px; align-items: center; width: 100%; }
  .hero-badge { display: inline-block; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4); color: var(--gold); font-size: 11px; letter-spacing: 3px; padding: 6px 16px; text-transform: uppercase; margin-bottom: 24px; }
  .hero h1 { font-family: 'Roboto', sans-serif; color: var(--white); font-size: 58px; line-height: 1.15; font-weight: 900; margin-bottom: 12px; }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero-subtitle { color: rgba(255,255,255,0.65); font-size: 16px; line-height: 1.7; margin-bottom: 32px; max-width: 520px; font-weight: 300; }
  .hero-stats { display: flex; gap: 32px; margin-bottom: 40px; }
  .hero-stat-item { text-align: center; border-left: 1px solid rgba(201,168,76,0.3); padding-left: 24px; }
  .hero-stat-item:first-child { border-left: none; padding-left: 0; }
  .hero-stat-num { color: var(--gold); font-family: 'Roboto', sans-serif; font-size: 32px; font-weight: 900; line-height: 1; }
  .hero-stat-label { color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 1px; margin-top: 4px; }
  .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-primary { background: var(--gold); color: var(--navy); padding: 16px 32px; border-radius: 2px; font-weight: 700; font-size: 14px; text-decoration: none; letter-spacing: 0.5px; transition: all 0.2s; display: inline-block; }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--white); padding: 15px 32px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.4); font-weight: 500; font-size: 14px; text-decoration: none; letter-spacing: 0.5px; transition: all 0.2s; display: inline-block; }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* LEAD FORM in hero */
  .hero-form { background: var(--white); border-radius: 4px; padding: 32px 28px; box-shadow: 0 24px 60px rgba(0,0,0,0.3); position: relative; }
  .form-title { font-family: 'Roboto', sans-serif; font-size: 20px; color: var(--navy); margin-bottom: 6px; font-weight: 700; }
  .form-sub { font-size: 13px; color: var(--text-light); margin-bottom: 24px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-mid); letter-spacing: 0.5px; margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; padding: 12px 14px; border: 1px solid #DDD; border-radius: 2px;
    font-size: 14px; font-family: 'Roboto', sans-serif; color: var(--text-dark);
    transition: border-color 0.2s; background: var(--white);
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--gold); }
  .form-group input::placeholder { color: #CCC; }
  .btn-cta-form {
    width: 100%; background: var(--red-cta); color: var(--white);
    padding: 15px; border: none; border-radius: 2px; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.5px; font-family: 'Roboto', sans-serif;
    transition: background 0.2s; margin-top: 4px;
  }
  .btn-cta-form:hover { background: var(--red-hover); }
  .form-note { font-size: 11px; color: var(--text-light); text-align: center; margin-top: 10px; }
  .form-urgency { background: #FFF8EC; border: 1px solid #F0C040; border-radius: 2px; padding: 8px 12px; font-size: 12px; color: #8B6000; margin-bottom: 16px; text-align: center; font-weight: 600; }

  /* SECTION COMMONS */
  section { padding: 80px 40px; }
  .container { max-width: 1200px; margin: 0 auto; }
  .section-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; font-weight: 600; }
  .section-title { font-family: 'Roboto', sans-serif; font-size: 40px; font-weight: 700; line-height: 1.2; color: var(--navy); margin-bottom: 16px; }
  .section-title em { color: var(--gold); font-style: normal; }
  .section-desc { font-size: 16px; color: var(--text-mid); line-height: 1.8; max-width: 640px; font-weight: 300; }
  .divider { width: 48px; height: 3px; background: var(--gold); margin: 20px 0; }

  /* TICKER STRIP */
  .ticker { background: var(--gold); padding: 12px 0; overflow: hidden; }
  .ticker-inner { display: flex; gap: 60px; animation: ticker 25s linear infinite; white-space: nowrap; width: max-content; }
  .ticker-item { font-size: 13px; font-weight: 600; color: var(--navy); letter-spacing: 1px; text-transform: uppercase; }
  .ticker-dot { color: var(--navy); opacity: 0.4; }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* OVERVIEW */
  .overview { background: var(--cream); }
  .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
  .overview-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 32px; }
  .stat-card { background: var(--white); border: 1px solid var(--cream-dark); border-left: 3px solid var(--gold); padding: 20px; border-radius: 2px; }
  .stat-card-num { font-family: 'Roboto', sans-serif; font-size: 28px; color: var(--navy); font-weight: 700; }
  .stat-card-label { font-size: 12px; color: var(--text-light); margin-top: 4px; letter-spacing: 0.5px; }
  .info-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
  .info-table tr { border-bottom: 1px solid var(--cream-dark); }
  .info-table td { padding: 12px 0; font-size: 14px; vertical-align: top; }
  .info-table td:first-child { color: var(--text-light); width: 48%; font-weight: 500; }
  .info-table td:last-child { color: var(--navy); font-weight: 600; }

  /* LOCATION */
  .location { background: var(--white); }
  .location-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
  .connect-list { list-style: none; margin-top: 24px; }
  .connect-list li { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--cream-dark); font-size: 14px; color: var(--text-mid); line-height: 1.5; }
  .connect-list li::before { content: ''; display: block; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .map-placeholder { background: var(--navy); border-radius: 4px; aspect-ratio: 4/3; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.6); font-size: 14px; gap: 12px; position: relative; overflow: hidden; }
  .map-pin { font-size: 36px; }
  .map-label { font-family: 'Roboto', sans-serif; font-size: 18px; color: var(--gold); font-weight: 700; }

  /* AMENITIES */
  .amenities { background: var(--navy); }
  .amenities .section-title { color: var(--white); }
  .amenities .section-desc { color: rgba(255,255,255,0.6); }
  .amenities .divider { background: var(--gold); }
  .amenity-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 48px; }
  .amenity-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.15); padding: 28px 24px; border-radius: 2px; transition: all 0.25s; }
  .amenity-card:hover { background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.4); transform: translateY(-2px); }
  .amenity-icon { font-size: 28px; margin-bottom: 16px; display: block; }
  .amenity-title { font-size: 16px; font-weight: 600; color: var(--white); margin-bottom: 8px; }
  .amenity-desc { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; }

  /* WHY REASONS */
  .reasons { background: var(--cream); }
  .reasons-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
  .reason-card { background: var(--white); padding: 28px 24px; border-radius: 2px; border-top: 3px solid var(--gold); border: 1px solid var(--cream-dark); border-top: 3px solid var(--gold); }
  .reason-num { font-family: 'Roboto', sans-serif; font-size: 48px; color: var(--cream-dark); font-weight: 900; line-height: 1; margin-bottom: 12px; }
  .reason-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 10px; line-height: 1.4; }
  .reason-desc { font-size: 13px; color: var(--text-mid); line-height: 1.7; }

  /* PRODUCT TYPES */
  .products { background: var(--white); }
  .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 48px; }
  .product-card { background: var(--navy); border-radius: 2px; overflow: hidden; position: relative; transition: transform 0.2s; }
  .product-card:hover { transform: translateY(-4px); }
  .product-visual { height: 180px; background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy-mid) 100%); display: flex; align-items: center; justify-content: center; font-size: 48px; border-bottom: 2px solid rgba(201,168,76,0.2); }
  .product-content { padding: 24px 20px; }
  .product-type { font-size: 11px; letter-spacing: 2px; color: var(--gold); font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
  .product-name { font-family: 'Roboto', sans-serif; font-size: 20px; color: var(--white); margin-bottom: 12px; font-weight: 700; }
  .product-details { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.7; }
  .product-cta { display: block; margin-top: 20px; text-align: center; background: transparent; border: 1px solid rgba(201,168,76,0.5); color: var(--gold); padding: 10px; font-size: 13px; text-decoration: none; border-radius: 2px; transition: all 0.2s; cursor: pointer; font-family: 'Roboto', sans-serif; font-weight: 600; }
  .product-cta:hover { background: var(--gold); color: var(--navy); }

  /* CTA BANNER */
  .cta-banner { background: var(--gold); padding: 60px 40px; text-align: center; }
  .cta-banner h2 { font-family: 'Roboto', sans-serif; font-size: 36px; color: var(--navy); margin-bottom: 12px; font-weight: 700; }
  .cta-banner p { color: var(--navy); opacity: 0.7; font-size: 16px; margin-bottom: 32px; font-weight: 300; }
  .cta-banner-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .btn-navy { background: var(--navy); color: var(--white); padding: 16px 36px; border-radius: 2px; font-weight: 700; font-size: 15px; text-decoration: none; letter-spacing: 0.5px; transition: background 0.2s; display: inline-block; }
  .btn-navy:hover { background: var(--navy-mid); }
  .btn-white { background: var(--white); color: var(--navy); padding: 16px 36px; border-radius: 2px; font-weight: 700; font-size: 15px; text-decoration: none; letter-spacing: 0.5px; transition: all 0.2s; display: inline-block; }
  .btn-white:hover { background: var(--cream); }

  /* LEAD FORM SECTION */
  .lead-section { background: var(--navy); padding: 80px 40px; }
  .lead-wrapper { max-width: 900px; margin: 0 auto; }
  .lead-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
  .lead-left .section-title { color: var(--white); }
  .lead-left .section-desc { color: rgba(255,255,255,0.6); margin-top: 12px; }
  .lead-left .divider { background: var(--gold); }
  .lead-perks { list-style: none; margin-top: 28px; }
  .lead-perks li { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.7); font-size: 14px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .lead-perks li::before { content: '✦'; color: var(--gold); font-size: 10px; flex-shrink: 0; }
  .lead-form-box { background: var(--white); border-radius: 4px; padding: 36px 32px; }
  .lead-form-box .form-title { font-size: 22px; }

  /* DEVELOPER */
  .developer { background: var(--cream); }
  .dev-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 60px; align-items: center; }
  .dev-logo-box { background: var(--navy); border-radius: 4px; padding: 40px; display: flex; align-items: center; justify-content: center; }
  .dev-logo-text { font-family: 'Roboto', sans-serif; color: var(--gold); font-size: 22px; text-align: center; line-height: 1.4; font-weight: 700; }
  .dev-desc { font-size: 15px; color: var(--text-mid); line-height: 1.8; margin-bottom: 20px; font-weight: 300; }

  /* FOOTER */
  footer { background: var(--navy); padding: 40px; text-align: center; border-top: 1px solid rgba(201,168,76,0.2); }
  .footer-logo { font-family: 'Roboto', sans-serif; color: var(--gold); font-size: 24px; margin-bottom: 8px; font-weight: 900; letter-spacing: 2px; }
  .footer-addr { color: rgba(255,255,255,0.5); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
  .footer-phone { color: var(--gold); font-size: 20px; font-weight: 700; text-decoration: none; }
  .footer-bottom { margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); font-size: 12px; }

  /* FLOATING CTA */
  .float-cta { position: fixed; bottom: 24px; right: 24px; z-index: 998; }
  .float-btn { background: var(--red-cta); color: var(--white); border: none; padding: 14px 22px; border-radius: 2px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Be Vietnam Pro', sans-serif; box-shadow: 0 4px 20px rgba(192,57,43,0.5); transition: all 0.2s; letter-spacing: 0.3px; display: block; text-align: center; text-decoration: none; }
  .float-btn:hover { background: var(--red-hover); transform: translateY(-2px); }
  .float-phone { display: block; margin-top: 8px; background: var(--gold); color: var(--navy); text-align: center; padding: 10px 22px; border-radius: 2px; font-size: 13px; font-weight: 700; text-decoration: none; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal-box { background: var(--white); border-radius: 4px; padding: 40px; max-width: 480px; width: 90%; position: relative; max-height: 90vh; overflow-y: auto; }
  .modal-close { position: absolute; top: 16px; right: 20px; font-size: 22px; cursor: pointer; color: var(--text-light); background: none; border: none; font-family: monospace; }
  .modal-close:hover { color: var(--text-dark); }
  .success-msg { display: none; text-align: center; padding: 20px 0; }
  .success-msg .success-icon { font-size: 48px; margin-bottom: 16px; }
  .success-msg h3 { font-family: 'Roboto', sans-serif; font-size: 22px; color: var(--navy); margin-bottom: 8px; font-weight: 700; }
  .success-msg p { color: var(--text-mid); font-size: 14px; }

  @media (max-width: 900px) {
    nav { padding: 0 20px; }
    .nav-links { display: none; }
    .hero-content, .overview-grid, .location-grid, .lead-grid, .dev-grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 38px; }
    .hero-form { margin-top: 32px; }
    section { padding: 60px 20px; }
    .amenity-grid, .reasons-grid, .product-grid { grid-template-columns: 1fr 1fr; }
    .hero-stats { gap: 20px; }
    .hero-stat-num { font-size: 24px; }
  }
  @media (max-width: 600px) {
    .amenity-grid, .reasons-grid, .product-grid { grid-template-columns: 1fr; }
    .overview-stats { grid-template-columns: 1fr 1fr; }
    .hero-actions { flex-direction: column; }
    .cta-banner-actions { flex-direction: column; align-items: center; }
  }
</style>
</head>
<body>
<section class="hero" id="hero">
  <div class="hero-content">
<center><h1>COMMING SOON</h1></center>
  </div></section>
</body>
</html>
